<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>懸案・進捗マイルストーン</title>
  <style>
    :root { --ink:#172126; --muted:#637279; --line:#d8e0e3; --band:#f3f6f7; --accent:#006d77; --warn:#a76300; --bad:#a33a3a; --ok:#247a4b; font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    * { box-sizing:border-box; } body { margin:0; color:var(--ink); background:#fff; font-size:10px; }
    header { position:sticky; top:0; z-index:4; display:flex; align-items:center; justify-content:space-between; gap:6px; padding:4px 6px; border-bottom:1px solid var(--line); background:#fff; }
    h1 { margin:0; font-size:12px; white-space:nowrap; } a,button { height:19px; border:1px solid var(--line); border-radius:3px; background:#fff; color:var(--ink); padding:1px 5px; text-decoration:none; font:inherit; } button,.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    main { padding:5px 6px 14px; } .kpis { display:grid; grid-template-columns:repeat(7,minmax(82px,1fr)); gap:1px; background:var(--line); border:1px solid var(--line); }
    .kpi { background:#fff; padding:3px 4px; min-width:0; } .kpi b { display:block; font-size:12px; line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } .kpi span { color:var(--muted); font-size:9px; }
    .grid { display:grid; grid-template-columns:1.25fr .75fr; gap:6px; margin-top:6px; align-items:start; } .panel { min-width:0; border-top:1px solid var(--accent); padding-top:3px; }
    .panel h2 { margin:0 0 2px; font-size:11px; display:flex; justify-content:space-between; gap:5px; } table { width:100%; border-collapse:collapse; table-layout:fixed; }
    th,td { border-bottom:1px solid var(--line); padding:1px 3px; line-height:1.12; text-align:left; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; } th { color:var(--muted); background:#fafbfb; }
    .record { white-space:pre-wrap; border:1px solid var(--line); background:#fbfcfc; padding:5px; max-height:520px; overflow:auto; line-height:1.25; } .bar { height:6px; background:#edf1f2; border-radius:3px; overflow:hidden; } .bar i { display:block; height:100%; background:var(--accent); }
    .tag { display:inline-block; border-radius:999px; color:#fff; background:var(--muted); padding:0 4px; font-size:9px; } .ok { background:var(--ok); } .warn { background:var(--warn); } .bad { background:var(--bad); } .mono { font-variant-numeric:tabular-nums; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; } .muted { color:var(--muted); }
    @media (max-width:920px){ .kpis{grid-template-columns:repeat(2,minmax(110px,1fr));}.grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
<header><h1>懸案・進捗マイルストーン</h1><div><button id="reload" type="button">更新</button><a href="/reports/models">モデル</a><a href="/reports/teleboat">Teleboat</a><a class="primary" href="/">ダッシュボード</a></div></header>
<main>
  <div id="kpis" class="kpis"></div>
  <div class="grid">
    <div class="panel"><h2><span>DB作業チケット</span><span class="muted">進捗の正本</span></h2><table><thead><tr><th>ID</th><th>優先</th><th>領域</th><th>状態</th><th>進捗</th><th>担当</th><th>作業 / 受入条件</th></tr></thead><tbody id="ticketRows"></tbody></table></div>
    <div class="panel"><h2><span>進行中の懸案</span><span id="meta" class="muted"></span></h2><div id="record" class="record"></div></div>
    <div class="panel"><h2><span>常駐プロセス</span><span class="muted">boatrace_ai</span></h2><table><thead><tr><th>種別</th><th>PID</th><th>cmd</th></tr></thead><tbody id="processRows"></tbody></table></div>
    <div class="panel"><h2><span>マイルストーン</span><span class="muted">更新対象</span></h2><table><thead><tr><th>ID</th><th>状態</th><th>進捗</th><th>次作業</th></tr></thead><tbody id="milestoneRows"></tbody></table></div>
    <div class="panel"><h2><span>改善事項</span><span class="muted">要改善を完了扱いしない</span></h2><table><thead><tr><th>ID</th><th>対象</th><th>状態</th><th>進捗</th><th>改善内容/次作業</th></tr></thead><tbody id="improvementRows"></tbody></table></div>
    <div class="panel"><h2><span>完了ゲート</span><span class="muted">動的判定</span></h2><table><thead><tr><th>対象</th><th>判定</th><th>根拠</th><th>次作業</th></tr></thead><tbody id="gateRows"></tbody></table></div>
    <div class="panel"><h2><span>リモート評価</span><span id="remoteEvalMeta" class="muted"></span></h2><table><thead><tr><th>PID</th><th>対象</th><th>状態</th><th>経過</th><th>指標</th></tr></thead><tbody id="remoteEvalRows"></tbody></table></div>
    <div class="panel"><h2><span>専門エージェント</span><span class="muted">回収待ち含む</span></h2><table><thead><tr><th>名前</th><th>領域</th><th>状態</th><th>担当</th></tr></thead><tbody id="agentRows"></tbody></table></div>
    <div class="panel"><h2><span>モデル成果物</span><span class="muted">最新順</span></h2><table><thead><tr><th>file</th><th>種別</th><th>サイズ</th><th>指標</th></tr></thead><tbody id="artifactRows"></tbody></table></div>
    <div class="panel"><h2><span>v系ファイル棚卸し</span><span id="vMeta" class="muted"></span></h2><table><thead><tr><th>sample</th></tr></thead><tbody id="vRows"></tbody></table></div>
  </div>
</main>
<script>
const $ = id => document.getElementById(id);
const esc = v => String(v ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
const fmt = v => v == null ? "-" : Number(v).toLocaleString("ja-JP");
const pct = v => v == null ? "-" : `${(Number(v)*100).toFixed(1)}%`;
const bytes = v => { v=Number(v||0); if(v>1048576) return `${(v/1048576).toFixed(1)}MB`; if(v>1024) return `${(v/1024).toFixed(1)}KB`; return `${v}B`; };
function tag(status){ const s=String(status||""); const c=s.includes("完了")?"ok":s.includes("要")||s.includes("失敗")?"bad":s.includes("進行")||s.includes("調査")?"warn":""; return `<span class="tag ${c}">${esc(s)}</span>`; }
function ticketStatus(status){ return ({queued:"待機",in_progress:"進行中",blocked:"保留",completed:"完了",cancelled:"中止"})[status]||status||"-"; }
async function load(){ const res=await fetch('/api/reports/roadmap-status',{cache:'no-store'}); const data=await res.json(); render(data); }
function render(data){
  const p=(data.progress||{}), t=(p.today||{}), h=(p.historical||{}), rt=(p.realtime||{}), s=(data.summary||{}), v=(data.v_file_inventory||{});
  $('meta').textContent=`更新 ${String(data.generated_at||'').replace('T',' ').slice(0,19)}`;
  $('kpis').innerHTML=[['当日R',`${fmt(t.races)}/${fmt(t.target_races)}`],['当日結果残',fmt(t.final_remaining)],['過去結果日残',fmt(h.result_remaining_days)],['実odds学習R',`${fmt(rt.eligible_races)}/${fmt(rt.target_eligible_races)}`],['予測R',fmt(s.predictions)],['odds snap',fmt(s.odds_snapshots)],['v系py',fmt(v.count)]].map(([l,x])=>`<div class="kpi"><b title="${esc(x)}">${esc(x)}</b><span>${esc(l)}</span></div>`).join('');
  $('ticketRows').innerHTML=(data.tickets||[]).map(r=>`<tr><td class="mono">${esc(r.ticket_key)}</td><td class="mono">${esc(r.priority)}</td><td>${esc(r.area)}</td><td>${tag(ticketStatus(r.status))}</td><td><div class="bar"><i style="width:${Number(r.progress||0)}%"></i></div></td><td>${esc(r.owner)}</td><td title="${esc((r.description||'')+' / '+(r.acceptance_criteria||''))}">${esc(r.title)} / ${esc(r.acceptance_criteria)}</td></tr>`).join('') || '<tr><td colspan="7" class="muted">DBチケット初期化待ち</td></tr>';
  $('record').textContent=data.record_markdown||'';
  $('processRows').innerHTML=(data.processes||[]).map(r=>`<tr><td>${esc(r.kind)}</td><td class="mono">${esc(r.pid)}</td><td title="${esc(r.cmd)}">${esc(r.cmd)}</td></tr>`).join('') || '<tr><td colspan="3" class="muted">稼働プロセスなし</td></tr>';
  $('milestoneRows').innerHTML=(data.milestones||[]).map(r=>`<tr><td class="mono" title="${esc(r.title)}">${esc(r.id)} ${esc(r.title)}</td><td>${tag(r.status)}</td><td><div class="bar"><i style="width:${Number(r.progress||0)}%"></i></div></td><td title="${esc(r.next)}">${esc(r.next)}</td></tr>`).join('');
  $('improvementRows').innerHTML=(data.improvements||[]).map(r=>`<tr><td class="mono">${esc(r.id)}</td><td>${esc(r.milestone)}</td><td>${tag(r.status)}</td><td><div class="bar"><i style="width:${Number(r.progress||0)}%"></i></div></td><td title="${esc((r.item||'')+' / '+(r.next||''))}">${esc(r.item)} / ${esc(r.next)}</td></tr>`).join('') || '<tr><td colspan="5" class="muted">改善事項なし</td></tr>';
  $('gateRows').innerHTML=(data.quality_gates||[]).map(r=>`<tr><td>${esc(r.target)}</td><td>${tag(r.status)}</td><td title="${esc(r.evidence)}">${esc(r.evidence)}</td><td title="${esc(r.next)}">${esc(r.next)}</td></tr>`).join('') || '<tr><td colspan="4" class="muted">ゲート情報なし</td></tr>';
  const re=data.remote_evaluations||{}; $('remoteEvalMeta').textContent=[re.status||'', String(re.generated_at||'').replace('T',' ').slice(0,19)].filter(Boolean).join(' / ');
  $('remoteEvalRows').innerHTML=(re.jobs||[]).map(r=>`<tr><td class="mono">${esc(r.pid)}</td><td title="${esc(r.name)}">${esc(r.milestone||'')} ${esc(r.kind||'')}</td><td>${tag(r.status)}</td><td class="mono">${esc((r.process&&r.process.elapsed)||'-')}</td><td title="${esc(remoteMetricText(r))}">${esc(remoteMetricText(r))}</td></tr>`).join('') || '<tr><td colspan="5" class="muted">リモート評価状態なし</td></tr>';
  $('agentRows').innerHTML=(data.agents||[]).map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.area)}</td><td>${tag(r.status)}</td><td title="${esc(r.task)}">${esc(r.task)}</td></tr>`).join('');
  $('artifactRows').innerHTML=(data.model_artifacts||[]).map(r=>`<tr><td title="${esc(r.file)}">${esc(r.file)}</td><td>${esc(r.kind)}</td><td class="mono">${bytes(r.size_bytes)}</td><td title="${esc(metricText(r))}">${esc(metricText(r))}</td></tr>`).join('') || '<tr><td colspan="4" class="muted">成果物なし</td></tr>';
  $('vMeta').textContent=`${fmt(v.count)}件 / ${v.note||''}`;
  $('vRows').innerHTML=(v.sample||[]).map(x=>`<tr><td title="${esc(x)}">${esc(x)}</td></tr>`).join('');
}
function metricText(r){ return [['ROI',r.roi],['損益',r.profit_yen],['R',r.evaluated_races],['LL',r.entry_log_loss],['1着',r.winner_top1_accuracy],['3T5',r.trifecta_top5_hit_rate]].filter(([,v])=>v!=null).map(([k,v])=>`${k}:${k==='ROI'||k==='1着'||k==='3T5'?Number(v).toFixed(3):fmt(v)}`).join(' / '); }
function remoteMetricText(r){ const m=(r.result&&r.result.metrics)||{}; const b=(r.result&&r.result.base_metrics)||{}; const x={...b,...m}; return [['ROI',x.roi],['損益',x.profit_yen],['R',x.evaluated_races],['実od',x.real_odds_races],['skip',x.skipped_no_real_odds],['LL',x.entry_log_loss],['1着',x.winner_top1_accuracy],['3T5',x.trifecta_top5_hit_rate]].filter(([,v])=>v!=null).map(([k,v])=>`${k}:${k==='ROI'||k==='LL'||k==='1着'||k==='3T5'?Number(v).toFixed(3):fmt(v)}`).join(' / ') || (r.running?'計算中':'結果未生成'); }
$('reload').onclick=load; load(); setInterval(load,30000);
</script>
</body>
</html>
