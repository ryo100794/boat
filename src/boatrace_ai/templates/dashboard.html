<script>
const state = { raceId:null, jcd:"", combo:"1-2-3", nowIso:null, bankModel:localStorage.getItem("boat.bankModel") || "" };
const $ = id => document.getElementById(id);
function jstDate(){
  const parts = new Intl.DateTimeFormat("en-CA", { timeZone:"Asia/Tokyo", year:"numeric", month:"2-digit", day:"2-digit" }).formatToParts(new Date());
  const m = Object.fromEntries(parts.map(p => [p.type, p.value]));
  return `${m.year}-${m.month}-${m.day}`;
}
const today = jstDate();
$("raceDate").value = "";
$("reload").onclick = loadAll;
$("bankrollModel").onchange = () => {
  state.bankModel = $("bankrollModel").value;
  localStorage.setItem("boat.bankModel", state.bankModel);
  $("bankrollMeta").textContent = "当日初回から再計算中";
  loadDayBankroll($("raceDate").value || "");
};
$("combo").onchange = () => { state.combo = $("combo").value; loadOdds(); };
async function getJson(url){ const res = await fetch(url,{cache:"no-store"}); if(!res.ok) throw new Error(await res.text()); return await res.json(); }
function stat(label,value){ return `<div class="stat"><b>${value ?? "-"}</b><span>${label}</span></div>`; }
function pct(v){ return v == null ? "-" : `${(Number(v)*100).toFixed(2)}%`; }
function num(v){ return v == null ? "-" : Number(v).toFixed(3); }
function yen(v){ return v == null ? "-" : `${Math.round(Number(v)).toLocaleString("ja-JP")}円`; }
function hm(v){ if(!v) return "-"; return new Date(v).toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit",timeZone:"Asia/Tokyo"}); }
function age(v){ if(!v) return "-"; const m = Math.floor((Date.now()-new Date(v).getTime())/60000); return `${hm(v)} (${m}分前)`; }
function minLabel(v){ return v == null ? "-" : `${v}分`; }
function deadlineCountdown(value){ if(!value) return "締切--:--前"; const seconds=Math.max(0,Math.ceil((new Date(value).getTime()-Date.now())/1000)); const mm=String(Math.floor(seconds/60)).padStart(2,"0"); const ss=String(seconds%60).padStart(2,"0"); return `締切${mm}:${ss}前`; }
function updateDeadlineCountdowns(){ document.querySelectorAll("[data-deadline-countdown]").forEach(el => { el.textContent=deadlineCountdown(el.dataset.deadlineCountdown); }); }
function cls(v){ return String(v || "").replaceAll(" ",""); }
function statusClass(v){ return v==="監視中" ? "live" : v==="終了" ? "done" : (v==="未取得"||v==="開催なし") ? "" : "wait"; }
function footerStatus(s, prog, nowIso){ const h=prog.historical||{}, t=prog.today||{}; return `過去分: 番組LZH 残${h.program_remaining_days ?? "-"}日 / 結果LZH 残${h.result_remaining_days ?? "-"}日 / parsed ${h.races ?? "-"}R / 結果 ${h.result_races ?? "-"}R | 本日分: レース 残${t.race_remaining ?? "-"} / 出走 残${t.racelist_remaining ?? "-"} / odds 残${t.odds_remaining ?? "-"} / 結果 残${t.final_remaining ?? "-"} / 予測 ${s.predictions} | 更新 ${nowIso.replace("T"," ").slice(0,19)}`; }
function statusTitle(v){ return v==="監視中" ? "出走表とオッズを取得済みで、ライブ更新対象です。" : v==="出走待" ? "締切後、出走時刻前です。" : v==="出走" ? "出走時刻から7分以内です。" : v==="結果待" ? "出走後、結果を取得中です。" : v==="出走表" ? "出走表は取得済み、オッズは未取得です。" : v==="開催なし" ? "本日はこの場の開催が確認されていません。" : v==="取得中" ? "当日レース情報を取得中です。" : v==="終了" ? "全レースの結果が入っています。" : "当日データはまだ未取得です。"; }
function venueTone(v){ if(v.next_time_status==="出走") return "s-racing"; if(["出走待","結果待"].includes(v.next_time_status || "")) return "s-wait"; const m = v.minutes_to_next_deadline; if(m != null && m <= 5) return "due"; if(m != null && m <= 15) return "urgent"; if(v.status==="監視中") return "s-live"; if(v.status==="終了") return "s-done"; if(v.status==="未取得" || v.status==="開催なし") return "s-none"; return "s-wait"; }
function venueRaceLabel(v){ const s=v.next_time_status || ""; return ["出走待","出走","結果待"].includes(s) ? `<span class="badge ${cls(s)}">${s}</span>` : `<span>${minLabel(v.minutes_to_next_deadline)}</span>`; }
function rowTone(r, isPick, idx){ const m = r.minutes_to_deadline; const parts = []; if(isPick) parts.push("pick"); if(m != null && m <= 5) parts.push("due"); else if(m != null && m <= 15) parts.push("soon"); else if(idx < 4) parts.push("near"); return parts.join(" "); }
function guideScore(r){ const p=r.buy_prediction||r.top_prediction||{}; return Number(p.expected_value ?? p.probability ?? 0); }
function fallbackCandidates(upcoming, candidateMap){ if(candidateMap.size) return candidateMap; const rows=upcoming.filter(r => r.top_prediction && r.entries === 6 && r.time_status !== "締切後" && r.time_status !== "確定" && (r.minutes_to_deadline == null || r.minutes_to_deadline >= 5)).sort((a,b)=>guideScore(b)-guideScore(a)).slice(0,8); return new Map(rows.map(r => [r.race_id, r])); }
function futureRows(rows){
  const nowMs = state.nowIso ? new Date(state.nowIso).getTime() : Date.now();
  return rows.filter(r => {
    if(r.deadline_at) return new Date(r.deadline_at).getTime() >= nowMs;
    return !["確定","締切後"].includes(r.time_status || "");
  }).sort((a,b) => {
    const av = a.deadline_at ? new Date(a.deadline_at).getTime() : Number.MAX_SAFE_INTEGER;
    const bv = b.deadline_at ? new Date(b.deadline_at).getTime() : Number.MAX_SAFE_INTEGER;
    return av - bv || String(a.jcd).localeCompare(String(b.jcd)) || Number(a.rno || 0) - Number(b.rno || 0);
  });
}
async function loadAll(){
  const d = $("raceDate").value || "";
  const loadId = Date.now();
  state.loadId = loadId;
  $("clock").textContent = "JST 読込中";
  $("dataStatus").textContent = "当日一覧を読み込み中";
  $("accuracy").textContent = "集計中";
  const dayUrl = `/api/day?date=${encodeURIComponent(d)}&lite=1`;
  try {
    const [vcRes, dayRes] = await Promise.allSettled([
      getJson(`/api/venues?date=${encodeURIComponent(d)}`),
      getJson(dayUrl)
    ]);
    if(loadId !== state.loadId) return;
    const vc = settledValue(vcRes, { venues:[] }, "venues");
    const day = settledValue(dayRes, { now_jst:new Date().toISOString(), races:[] }, "day");
    state.nowIso = day.now_jst;
    state.dayRows = day.races || [];
    $("clock").textContent = `JST ${(day.now_jst || "").replace("T"," ").slice(0,16)}`;
    state.venueItems = vc.venues || [];
    renderVenues(state.venueItems);
    renderVisibleDay();
    $("dataStatus").textContent = `当日一覧 ${state.dayRows.length}R / 詳細集計は後追い中 / 更新 ${(day.now_jst || "").replace("T"," ").slice(0,19)}`;
    scheduleSelectedDetail(false);
    loadDayBankroll(d, loadId);
    loadSecondary(d, loadId);
  } catch(err) {
    console.error(err);
    $("dataStatus").textContent = `初回表示エラー: ${err.message || err}`;
  }
}
async function loadSecondary(d, loadId){
  const [guideRes, liveRes] = await Promise.allSettled([
    getJson(`/api/guide?date=${encodeURIComponent(d)}&before_minutes=5&limit=16&finished_limit=4`),
    getJson(`/api/live-wipe?date=${encodeURIComponent(d)}`)
  ]);
  if(loadId !== state.loadId) return;
  const guide = settledValue(guideRes, { candidates:[], finished:[] }, "guide");
  state.guideCandidates = guide.candidates || [];
  state.finishedRows = guide.finished || [];
  renderVisibleDay();
  const live = settledValue(liveRes, null, "live-wipe");
  if(live) renderLiveWipe(live);
  scheduleSelectedDetail(true);

  const [summaryRes, progressRes, accuracyRes, backtestRes] = await Promise.allSettled([
    getJson("/api/summary"),
    getJson(`/api/progress?date=${encodeURIComponent(d)}`),
    getJson(`/api/accuracy?date=${encodeURIComponent(d)}`),
    getJson("/api/backtest")
  ]);
  if(loadId !== state.loadId) return;
  const s = settledValue(summaryRes, null, "summary");
  const prog = settledValue(progressRes, null, "progress");
  const acc = settledValue(accuracyRes, null, "accuracy");
  const bt = settledValue(backtestRes, null, "backtest");
  if(s && prog) $("dataStatus").textContent = footerStatus(s, prog, state.nowIso || new Date().toISOString());
  if(acc) $("accuracy").textContent = `本日 ${acc.evaluated || 0}R / 1着 ${pct(acc.winner_top1_accuracy)} / 3T5 ${pct(acc.trifecta_top5_hit_rate)}`;
  if(bt) $("backtest").textContent = bt.available ? (bt.model_label || "過去ログ主系") + ` BT ${bt.evaluated_races}R / 1着 ${pct(bt.winner_top1_accuracy)} / 3T5 ${pct(bt.trifecta_top5_hit_rate)}` : "バックテスト結果はまだありません。";
}
async function loadDayBankroll(d, loadId=null){
  const model = state.bankModel ? `&model=${encodeURIComponent(state.bankModel)}` : "";
  try {
    const data = await getJson(`/api/day-bankroll?date=${encodeURIComponent(d)}${model}`);
    if(loadId !== null && loadId !== state.loadId) return;
    renderDayBankroll(data);
  } catch(err) {
    console.error(err);
    $("bankrollMeta").textContent = `資金運用エラー: ${err.message || err}`;
  }
}
function renderDayBankroll(data){
  const models = data.models || [];
  const selected = data.selected_model || "";
  $("bankrollModel").innerHTML = models.length
    ? models.map(m => `<option value="${escapeHtml(m.id)}" ${m.id===selected ? "selected" : ""}>${escapeHtml(m.label)} / ${escapeHtml(m.model_file || "")}</option>`).join("")
    : `<option value="">予測モデルなし</option>`;
  if(selected){
    state.bankModel = selected;
    localStorage.setItem("boat.bankModel", selected);
  }
  const s = data.stats || {};
  const profit = Number(s.profit_yen || 0);
  $("bankrollStats").innerHTML = [
    ["現在資金",yen(s.current_bankroll_yen),profit >= 0 ? "bankroll-profit" : "bankroll-loss"],
    ["損益",`${profit >= 0 ? "+" : ""}${yen(profit)}`,profit >= 0 ? "bankroll-profit" : "bankroll-loss"],
    ["ROI",s.roi == null ? "-" : pct(s.roi),""],
    ["投資",yen(s.stake_yen),""],
    ["払戻",yen(s.return_yen),""],
    ["購入R",`${s.selected_races || 0}/${s.evaluated_races || 0}`,""],
    ["口数",s.tickets || 0,""],
    ["的中",`${s.hit_tickets || 0} / ${pct(s.ticket_hit_rate)}`,""],
    ["最大DD",yen(s.max_drawdown_yen),""],
  ].map(([label,value,tone]) => `<div class="bankroll-kpi ${tone}"><b>${value}</b><span>${label}</span></div>`).join("");
  const warning = (data.warnings || []).join(" / ");
  $("bankrollMeta").textContent = `${data.selected_model_label || "-"} / ${s.valid_odds_races || 0}R正常odds / 更新 ${String(data.generated_at || "").replace("T"," ").slice(0,19)}${warning ? ` / ${warning}` : ""}`;
  drawBankrollChart("bankrollProfitChart", data.series || [], "profit_yen", "#247a4b", v => yen(v));
  drawBankrollChart("bankrollRoiChart", data.series || [], "cumulative_roi", "#8f2d56", v => `${v.toFixed(1)}%`, 100);
}
function drawBankrollChart(id, rows, key, color, label, multiplier=1){
  const canvas=$(id), ctx=canvas.getContext("2d"), w=canvas.width, h=canvas.height;
  ctx.clearRect(0,0,w,h); ctx.fillStyle="#fff"; ctx.fillRect(0,0,w,h);
  const points=rows.map((r,i)=>({i,value:r[key] == null ? null : Number(r[key])*multiplier,label:hm(r.race_time_at)})).filter(p=>Number.isFinite(p.value));
  ctx.font="16px ui-monospace,monospace"; ctx.textBaseline="middle";
  if(!points.length){ ctx.fillStyle="#637279"; ctx.fillText("正常な締切前oddsの確定レース待ち",52,h/2); return; }
  let min=Math.min(...points.map(p=>p.value)), max=Math.max(...points.map(p=>p.value));
  if(key==="profit_yen"){ min=Math.min(0,min); max=Math.max(0,max); }
  if(max===min){ max=min+1; }
  const pad={l:86,r:12,t:22,b:24}, pw=w-pad.l-pad.r, ph=h-pad.t-pad.b;
  ctx.strokeStyle="#d8e0e3"; ctx.fillStyle="#637279"; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=pad.t+ph*i/4, value=max-(max-min)*i/4;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
    ctx.textAlign="right";ctx.fillText(label(value),pad.l-7,y);
  }
  const xAt=i=>pad.l+(points.length===1?0:pw*i/(points.length-1));
  const yAt=v=>pad.t+(max-v)*ph/(max-min);
  ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();
  points.forEach((p,i)=>{ const x=xAt(i),y=yAt(p.value); if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y); });ctx.stroke();
  ctx.fillStyle="#637279";ctx.textAlign="center";
  [0,Math.floor((points.length-1)/2),points.length-1].forEach(i=>ctx.fillText(points[i].label,xAt(i),h-10));
}
function settledValue(result, fallback, label){
  if(result.status === "fulfilled") return result.value;
  console.warn(`${label} load failed`, result.reason);
  return fallback;
}
function scheduleSelectedDetail(allowRefresh){
  const rows = visibleRows(state.dayRows || []);
  let raceId = state.raceId;
  if(!raceId && rows.length){
    const byGuide = (state.guideCandidates || [])[0];
    const next = byGuide || futureRows(rows).find(r => r.top_prediction) || rows.find(r => r.top_prediction) || rows[0];
    raceId = next && next.race_id;
    state.raceId = raceId || null;
  }
  if(!raceId) return;
  const now = Date.now();
  if(!allowRefresh && state.detailRaceId === raceId) return;
  if(allowRefresh && state.detailRaceId === raceId && state.lastDetailAt && now - state.lastDetailAt < 55000) return;
  state.detailRaceId = raceId;
  state.lastDetailAt = now;
  setTimeout(() => selectRace(raceId).catch(err => {
    console.error(err);
    $("raceTitle").textContent = `レース詳細エラー: ${err.message || err}`;
  }), 0);
}

function visibleRows(rows){
  return state.jcd ? (rows || []).filter(row => String(row.jcd || "").padStart(2,"0") === state.jcd) : (rows || []);
}
function renderVisibleDay(){
  renderActionTable(
    visibleRows(state.dayRows || []),
    visibleRows(state.guideCandidates || []),
    visibleRows(state.finishedRows || [])
  );
}
function renderVenues(items){
  $("venueGrid").innerHTML = items.map(v => `<div class="venue ${v.code === state.jcd ? "active" : ""} ${venueTone(v)}" data-jcd="${v.code}">
    <b><span>${v.code} ${v.name}</span><span><button class="venue-archive" type="button" data-jcd="${v.code}" title="場の履歴">履</button><span class="badge ${statusClass(v.status)}" title="${statusTitle(v.status)}">${v.status}</span></span></b>
    <div class="next"><strong>${v.next_rno ? `${v.next_rno}R ${hm(v.next_deadline_at)}` : "-"}</strong>${venueRaceLabel(v)}<span class="od">od ${hm(v.latest_odds_at)}</span></div>
  </div>`).join("");
  document.querySelectorAll(".venue").forEach(el => el.onclick = () => {
    state.jcd = state.jcd === el.dataset.jcd ? "" : el.dataset.jcd;
    state.raceId = null;
    state.detailRaceId = null;
    renderVenues(state.venueItems || items);
    renderVisibleDay();
    scheduleSelectedDetail(false);
  });
  document.querySelectorAll(".venue-archive").forEach(btn => btn.onclick = ev => { ev.stopPropagation(); loadArchiveView("history", { kind:"venue", jcd:btn.dataset.jcd || "" }); });
}

function renderActionTable(rows, candidates, finished){
  let candidateMap = new Map((candidates || []).map(r => [r.race_id, r]));
  const upcoming = futureRows(rows);
  const ongoing = rows.filter(r => !r.is_final && ["出走待","出走","結果待"].includes(r.time_status || ""));
  candidateMap = fallbackCandidates(upcoming, candidateMap);
  const picks = upcoming.filter(r => candidateMap.has(r.race_id));
  const others = upcoming.filter(r => !candidateMap.has(r.race_id));
  const action = [
    ...finished.map(r => ({ kind:(r.is_final ? "確定" : (r.time_status || "結果待")), item:r, source:r, isPick:false, isFinal:true })),
    ...ongoing.map(r => ({ kind:r.time_status || "結果待", item:r, source:r, isPick:false, isFinal:true })),
    ...picks.map(r => ({ kind:"候補", item:candidateMap.get(r.race_id), source:r, isPick:true, isFinal:false })),
    ...others.map(r => ({ kind:"予定", item:r, source:r, isPick:false, isFinal:false })),
  ].sort((a,b) => {
    const av = actionTime(a);
    const bv = actionTime(b);
    if(av !== bv) return av - bv;
    return String(a.source.jcd).localeCompare(String(b.source.jcd)) || Number(a.source.rno || 0) - Number(b.source.rno || 0);
  });
  $("timelineInfo").textContent = `確定 ${finished.length}R / 進行 ${ongoing.length}R / 候補 ${picks.length}R / 今後 ${upcoming.length}R / 締切昇順`;
  $("actionRows").innerHTML = action.map((row,idx) => {
    const r = row.source;
    const item = row.item || r;
    const p = item.top_prediction || {};
    const ev = (item.buy_prediction || p || {}).expected_value;
    const shortRace = `${r.venue_name}${r.rno}R`;
    const when = timePair(r);
    if(row.isFinal){
      const ready = item.is_final && item.result_combination;
      const pendingStatus = item.time_status || "結果待";
      const mark = ready ? (item.top_hit ? "的中" : (item.top5_hit ? "上位5" : "外れ")) : pendingStatus;
      const result = ready ? `${item.result_combination} ${mark}` : (pendingStatus === "結果待" ? "結果待" : "-");
      const payout = ready ? (item.trifecta_payout_yen == null ? "-" : `${Number(item.trifecta_payout_yen).toLocaleString("ja-JP")}円`) : "-";
      const badge = ready ? "確定" : pendingStatus;

      {key:"motor_no",label:"M",mono:true},{key:"boat_no",label:"B",mono:true},{key:"rank",label:"着"},{key:"start_timing",label:"ST"},{key:"result_combination",label:"結果",mono:true},{key:"payout_yen",label:"払戻",format:yenCell}
    ], { raceLink:true });
}
function renderArchiveStats(data){
  $("archiveContent").innerHTML =
    `<div class="archive-tabs"><button type="button" onclick="loadArchiveView('stats',{scope:'lane'})">枠</button><button type="button" onclick="loadArchiveView('stats',{scope:'venue'})">場</button><button type="button" onclick="loadArchiveView('stats',{scope:'rno'})">R</button><button type="button" onclick="loadArchiveView('stats',{scope:'class'})">級</button><button type="button" onclick="loadArchiveView('stats',{scope:'motor'})">M</button><button type="button" onclick="loadArchiveView('stats',{scope:'boat'})">B</button></div>` +
    archiveTable(data.rows || [], [
      {key:"label",label:"対象"},{key:"starts",label:"件数"},{key:"wins",label:"1着"},{key:"top3",label:"3内"},{key:"win_rate",label:"1着率",format:pctCell},{key:"top3_rate",label:"3内率",format:pctCell},
      {key:"avg_rank",label:"平均着"},{key:"avg_start",label:"ST"},{key:"avg_national_win_rate",label:"全国"},{key:"avg_local_win_rate",label:"当地"},{key:"avg_motor_2_rate",label:"M2"},{key:"avg_boat_2_rate",label:"B2"}
    ]);
}
function wireArchiveNav(){
  $("navPast").onclick = () => loadArchiveView("overview");
  $("navToday").onclick = () => loadArchiveView("today", { jcd: state.jcd || "" });
  $("navStats").onclick = () => loadArchiveView("stats", { scope:"lane" });
  $("archivePast").onclick = () => loadArchiveView("overview");
  $("archiveToday").onclick = () => loadArchiveView("today", { jcd: state.jcd || "" });
  $("archiveStats").onclick = () => loadArchiveView("stats", { scope:"lane" });
}
wireArchiveNav();

loadAll(); setInterval(loadAll,30000); setInterval(updateDeadlineCountdowns,1000);
</script>
