<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teleboat ログイン設定</title>
  <style>
    :root { --ink:#172126; --muted:#637279; --line:#d8e0e3; --accent:#006d77; --bad:#a33a3a; font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    * { box-sizing:border-box; } body { margin:0; color:var(--ink); background:#fff; font-size:11px; }
    header { display:flex; align-items:center; justify-content:space-between; padding:5px 7px; border-bottom:1px solid var(--line); }
    h1 { margin:0; font-size:13px; } a,button { border:1px solid var(--accent); border-radius:3px; padding:3px 7px; background:#fff; color:var(--accent); text-decoration:none; font:inherit; }
    main { max-width:760px; padding:8px; } .state { display:flex; gap:12px; padding:4px 0; color:var(--muted); border-bottom:1px solid var(--line); }
    form { display:grid; grid-template-columns:repeat(3,minmax(130px,1fr)) auto; align-items:end; gap:6px; margin-top:8px; }
    label { display:grid; gap:2px; color:var(--muted); } input { width:100%; height:27px; border:1px solid var(--line); border-radius:3px; padding:3px 5px; color:var(--ink); font:inherit; }
    button { height:27px; background:var(--accent); color:#fff; cursor:pointer; } .error { min-height:16px; padding-top:5px; color:var(--bad); font-weight:700; }
    @media (max-width:680px) { form { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header><h1>Teleboat ログイン設定</h1><a href="/reports/teleboat">接続監査へ戻る</a></header>
<main>
  <div class="state"><span>実行: ローカル headless</span><span>用途: ログイン・ログアウト確認</span><span>投票: 無効</span></div>
  <div class="error" role="alert">__ERROR__</div>
  __FORM__
</main>
</body>
</html>
