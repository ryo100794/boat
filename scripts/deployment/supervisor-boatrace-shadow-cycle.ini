[program:boatrace-odds-shadow]
command=/workspace/boat/scripts/deployment/run-boatrace-shadow-cycle.sh
directory=/workspace/boat
priority=45
autostart=true
autorestart=true
startsecs=10
startretries=100
stopwaitsecs=60
stopasgroup=true
killasgroup=true
stopsignal=TERM
stdout_logfile=/workspace/boat/logs/runtime/realtime-odds-shadow.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
redirect_stderr=true
